version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: questboard_postgres
    environment:
      POSTGRES_USER: questboard
      POSTGRES_PASSWORD: questboard
      POSTGRES_DB: questboard
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U questboard']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: questboard_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: questboard_api
    environment:
      DATABASE_URL: postgresql://questboard:questboard@postgres:5432/questboard
      REDIS_URL: redis://redis:6379
      JWT_SECRET: questboard-dev-jwt-secret-key-32-chars
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 30d
      CLIENT_URL: http://localhost:5173
      PORT: 4000
      NODE_ENV: development
      S3_BUCKET: questboard-uploads
      S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: dev
      AWS_SECRET_ACCESS_KEY: dev
      CDN_BASE_URL: http://localhost:4000
      EMAIL_FROM: no-reply@questboard.app
      SMTP_HOST: localhost
      SMTP_PORT: '1025'
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: questboard_web
    ports:
      - '5173:5173'
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages/shared/src:/app/packages/shared/src

volumes:
  postgres_data:
  redis_data:
